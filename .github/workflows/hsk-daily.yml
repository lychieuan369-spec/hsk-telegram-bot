name: HSK Daily Lesson

on:
  schedule:
    - cron: '0 0 * * *'  # 7am Vietnam time (UTC+7 = 0:00 UTC)
  workflow_dispatch:

jobs:
  send-lesson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets
        run: echo "SUBSCRIBER_IDS length=${#SUBSCRIBER_IDS}"
        env:
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}

      - name: Load word indexes from GitHub Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}
        run: |
          for cid in $(echo "$SUBSCRIBER_IDS" | tr ',' '\n'); do
            cid=$(echo "$cid" | xargs)
            [ -z "$cid" ] && continue
            val=$(gh variable get "WORD_INDEX_${cid}" 2>/dev/null || echo "0")
            echo "WORD_INDEX_${cid}=${val}" >> "$GITHUB_ENV"
          done

      - name: Run daily lesson script
        run: python daily_lesson.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Save word indexes to GitHub Variables
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [ -f /tmp/word_index_updates.txt ] || exit 0
          while IFS='=' read -r cid idx; do
            [ -z "$cid" ] && continue
            gh variable set "WORD_INDEX_${cid}" --body "$idx"
          done < /tmp/word_index_updates.txt

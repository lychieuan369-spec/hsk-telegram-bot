name: HSK Daily Lesson

on:
  schedule:
    - cron: '0 0 * * *'   # 7:00 AM ICT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-lesson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets
        run: echo "SUBSCRIBER_IDS length=${#SUBSCRIBER_IDS}"
        env:
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}

      - name: Load word indexes from file
        env:
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}
        run: |
          [ -f word_index.json ] || echo '{}' > word_index.json
          for cid in $(echo "$SUBSCRIBER_IDS" | tr ',' '\n'); do
            cid=$(echo "$cid" | xargs)
            [ -z "$cid" ] && continue
            val=$(python -c "import json,sys; d=json.load(open('word_index.json')); print(d.get('$cid', 0))" 2>/dev/null || echo "0")
            echo "WORD_INDEX_${cid}=${val}" >> "$GITHUB_ENV"
          done

      - name: Run daily lesson script
        run: python daily_lesson.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUBSCRIBER_IDS: ${{ secrets.SUBSCRIBER_IDS }}

      - name: Save word indexes to file
        if: always()
        run: |
          [ -f /tmp/word_index_updates.txt ] || exit 0
          [ -f word_index.json ] || echo '{}' > word_index.json
          python - <<'EOF'
          import json
          data = json.load(open('word_index.json'))
          for line in open('/tmp/word_index_updates.txt'):
            line = line.strip()
            if '=' in line:
              cid, idx = line.split('=', 1)
              data[cid.strip()] = int(idx.strip())
          json.dump(data, open('word_index.json', 'w'))
          EOF
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add word_index.json
          git diff --cached --quiet || git commit -m "chore: update word index [skip ci]"
          git push
